plugins {
    id 'com.android.application'
}

android {
    namespace 'cacom.example.smarthome'
    compileSdk 33

    defaultConfig {
        applicationId "cacom.example.smarthome"
        minSdk 28
        targetSdk 33
        versionCode 1
        versionName "1.0"

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    buildFeatures {
        buildConfig true
    }

    buildTypes {
        debug {
            buildConfigField "String", "ARK_BASE_URL", "\"https://ark.cn-beijing.volces.com/api/v3\""
            buildConfigField "String", "ARK_MODEL", "\"doubao-seed-1-6-250615\""
            buildConfigField "String", "ARK_API_KEY", "\"REPLACE_WITH_YOUR_ARK_API_KEY\""
        }

        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            buildConfigField "String", "ARK_BASE_URL", "\"https://ark.cn-beijing.volces.com/api/v3\""
            buildConfigField "String", "ARK_MODEL", "\"doubao-seed-1-6-250615\""
            buildConfigField "String", "ARK_API_KEY", "\"REPLACE_WITH_YOUR_ARK_API_KEY\""
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {

    implementation 'androidx.appcompat:appcompat:1.4.1'
    implementation 'com.google.android.material:material:1.5.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.3'
    implementation files('libs\\org.eclipse.paho.client.mqttv3-1.2.0.jar')
    testImplementation 'junit:junit:4.13.2'
    androidTestImplementation 'androidx.test.ext:junit:1.1.3'
    androidTestImplementation 'androidx.test.espresso:espresso-core:3.4.0'
}
